<!DOCTYPE html>
<html>
<head>
	<title>Page Title</title>
</head>
<body>

<form id="infoForm">
  <label>
  	Username: 
  	<input type="text" name="username" id="username">
  </label>
  <label>
  	Email: 
  	<input type="text" name="email" id="email">
  </label>
  <label>
  	Phone Number: 
  	<input type="text" name="phone" id="phone">
  </label>
  <label>
  	Enter Password: 
  	<input type="password" name="newpass" id="newpass">
  </label>
  <label>
  	Confirm Password: 
  	<input type="password" name="confirmpass" id="confirmpass">
  </label>
  Email: <input type="text" name="email"><br>
  Phone number: <input type="text" name="number"><br>
  Enter Password: <input type="password" name="passOne"><br>
  Confirm Password: <input type="password" name="passTwo"><br>
  Gender: 
  <input type="radio" name="genderF" value="Female" id="gender-female">
  <label for="gender-female">Female</label>
  <input type="radio" name="genderM" value="Male" id="gender-male">
  <label for="gender-male">Male</label>
  <input type="radio" name="genderO" value="Other" id="gender-other">
  <label for="gender-other">Other</label><br>
  Age Group:  
<select id="ageGroup">
  <option>&lt; 21 years old</option>
  <option>21 - 25 years old</option>
  <option>26 - 35 years old</option>
  <option>36 - 50 years old</option>
  <option>&gt; 50 years old</option>
</select>
<br>
  Favorite Music Genre: 
  <input type="checkbox" name="musicP" id="pop"> Pop
  <input type="checkbox" name="musicHH" id="hiphop"> Hiphop
  <input type="checkbox" name="musicJ" id="jazz"> Jazz
  <input type="checkbox" name="musicR" id="rock"> Rock
  <input type="checkbox" name="musicCM" id="classical"> Classical Music
  <input type="checkbox" name="musicC" id="country"> Country
  <br><br>
  <input type="button" onclick="myFunction()" value="Submit">
</form>

</body>
</html>
