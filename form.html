<!DOCTYPE html>
<html>
<head>
	<title>Page Title</title>
</head>
<body>

<form id="infoForm">
  <label for="username">Username:</label>
  	<input type="text" name="username" id="username">
  <label for="email">Email:</label>
  	<input type="text" name="email" id="email">
  <label for="phone">Phone Number:</label>
  	<input type="text" name="phone" id="phone">
  <label for="pass">Enter Password:</label>
  	<input type="password" name="pass" id="pass">
  <label for="confirmPass">Confirm Password:</label>
  	<input type="password" name="confirmPass" id="confirmPass">
	
  <label for="gender">Gender:</label>
  <input type="radio" name="gender" value="Female" id="gender-female">
  <label for="gender-female">Female</label>
  <input type="radio" name="gender" value="Male" id="gender-male">
  <label for="gender-male">Male</label>
  <input type="radio" name="gender" value="Other" id="gender-other">
  <label for="gender-other">Other</label><br>
 
 <label for="ageGroup">Age Group:</label>
<select id="ageGroup">
  <option>&lt; 21 years old</option>
  <option>21 - 25 years old</option>
  <option>26 - 35 years old</option>
  <option>36 - 50 years old</option>
  <option>&gt; 50 years old</option>
</select>

<label for="music">Favorite Music Genre:</label>
  <input type="checkbox" name="music" id="pop"> Pop
  <input type="checkbox" name="music" id="hiphop"> Hiphop
  <input type="checkbox" name="music" id="jazz"> Jazz
  <input type="checkbox" name="music" id="rock"> Rock
  <input type="checkbox" name="music" id="classical"> Classical Music
  <input type="checkbox" name="music" id="country"> Country
  <br><br>
  <input type="button" onclick="myFunction()" value="Submit">
  <input type="reset" value="Reset">
</form>

</body>
</html>
